<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array Processor | Mohamed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h2 { color: #1a73e8; margin-bottom: 1rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { border-color: #1a73e8; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        .result-area {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f8f9fa;
            border-left: 5px solid #1a73e8;
            text-align: left;
            min-height: 50px;
        }
        .result-label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        #screen-result { color: #d93025; font-family: 'Courier New', monospace; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Array Processor</h2>
        <p>Enter elements (numbers or letters) separated by commas:</p>
        <input type="text" id="userInput" placeholder="Example: 1, 5, a, B, 10, k">
        <button onclick="processArray()">Process & Display</button>

        <div class="result-area">
            <span class="result-label">Output (Letters Only):</span>
            <div id="screen-result">Waiting for input...</div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
